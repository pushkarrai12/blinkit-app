<div class="notification-page">

  <div class="notification-card">

    <h1>Notifications 🔔</h1>
    <p>Latest updates and order alerts.</p>

    <div
      class="notify-item"
      *ngFor="let item of notifications"
    >
      <div class="icon">
        {{ item.icon }}
      </div>

      <div>
        <h3>{{ item.title }}</h3>
        <p>{{ item.message }}</p>
      </div>
    </div>

    <button
      class="clear-btn"
      *ngIf="notifications.length > 0"
      (click)="clearAll()"
    >
      Clear All
    </button>

    <h2 *ngIf="notifications.length === 0">
      No notifications available
    </h2>

  </div>

</div>
