<div class="seller-page">

  <div class="hero">
    <h1>Seller Dashboard 🏪</h1>
    <p>Manage products and track earnings.</p>
  </div>

  <div class="stats">

    <div class="stat-card">
      <h3>Total Earnings</h3>
      <p>₹{{ earnings }}</p>
    </div>

    <div class="stat-card">
      <h3>Total Products</h3>
      <p>{{ products.length }}</p>
    </div>

    <div class="stat-card">
      <h3>Total Orders</h3>
      <p>{{ totalOrders }}</p>
    </div>

  </div>

  <div class="seller-grid">

    <div class="add-box">

      <h2>Add Product</h2>

      <input
        type="text"
        placeholder="Product Name"
        [(ngModel)]="product.name"
      >

      <input
        type="text"
        placeholder="Price"
        [(ngModel)]="product.price"
      >

      <input
        type="text"
        placeholder="Stock"
        [(ngModel)]="product.stock"
      >

      <input
        type="text"
        placeholder="Image URL"
        [(ngModel)]="product.image"
      >

      <button class="add-btn" (click)="addProduct()">
        Add Product
      </button>

    </div>

    <div class="products-box">

      <h2>My Products</h2>

      <div
        class="product-card"
        *ngFor="let item of products; let i = index"
      >

        <img [src]="item.image">

        <div>
          <h3>{{ item.name }}</h3>
          <p>Stock: {{ item.stock }}</p>
          <strong>₹{{ item.price }}</strong>
        </div>

        <button
          class="delete-btn"
          (click)="deleteProduct(i)"
        >
          Delete
        </button>

      </div>

    </div>

  </div>

</div>
