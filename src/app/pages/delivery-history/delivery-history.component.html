<div class="history-page">

  <div class="history-header">
    <h1>Delivery History 🚚</h1>
    <p>View completed and cancelled deliveries.</p>
  </div>

  <div class="history-table">

    <div class="table-head">
      <span>Order ID</span>
      <span>Customer</span>
      <span>Address</span>
      <span>Amount</span>
      <span>Date</span>
      <span>Status</span>
    </div>

    <div
      class="table-row"
      *ngFor="let item of history"
    >

      <span>#{{ item.orderId }}</span>

      <span>{{ item.customer }}</span>

      <span>{{ item.address }}</span>

      <span>₹{{ item.amount }}</span>

      <span>{{ item.date }}</span>

      <span
        class="status"
        [class.cancelled]="item.status === 'Cancelled'"
      >
        {{ item.status }}
      </span>

    </div>

  </div>

</div>
